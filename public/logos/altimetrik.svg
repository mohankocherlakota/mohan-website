    <path d="M50,8 A42,42,0,0,1,92,50 L80,50 A30,30,0,0,0,50,20 Z"/>
    <!-- Arm 1 inner -->
    <path d="M50,22 A28,28,0,0,1,78,50 L66,50 A16,16,0,0,0,50,34 Z"/>
    <!-- Arm 2 outer -->
    <path d="M92,50 A42,42,0,0,1,29,87 L35,76 A30,30,0,0,0,80,50 Z"/>
    <!-- Arm 2 inner -->
    <path d="M78,50 A28,28,0,0,1,36,74 L42,63 A16,16,0,0,0,66,50 Z"/>
    <!-- Arm 3 outer -->
    <path d="M29,87 A42,42,0,0,1,8,50 L20,50 A30,30,0,0,0,35,76 Z"/>
    <!-- Arm 3 inner -->
    <path d="M36,74 A28,28,0,0,1,22,50 L34,50 A16,16,0,0,0,42,63 Z"/>
